name: Benchmarks

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read

jobs:
  bench:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run Criterion benches
        run: cargo bench --workspace || true

      - name: Package Criterion baseline
        shell: bash
        run: |
          if [ -d target/criterion ]; then
            tar -czf criterion-baseline.tar.gz target/criterion
          else
            mkdir -p target/criterion
            echo "No Criterion output was produced in this run." > target/criterion/placeholder.txt
            tar -czf criterion-baseline.tar.gz target/criterion
          fi

      - name: Upload Criterion baseline artifact
        uses: actions/upload-artifact@v4
        with:
          name: criterion-baseline
          path: criterion-baseline.tar.gz