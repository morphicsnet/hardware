name: Coverage

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

env:
  MIN_COVERAGE_LINES: "75"

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust (stable) with llvm-tools-preview
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install nextest
        uses: taiki-e/install-action@v2
        with:
          tool: nextest

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Cache cargo build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Clean coverage data
        run: cargo llvm-cov clean --workspace

      - name: Run tests with coverage (nextest)
        run: cargo llvm-cov nextest --workspace --no-report --doctests

      - name: Generate LCOV report
        run: cargo llvm-cov report --lcov --output-path lcov.info --fail-under-lines "${{ env.MIN_COVERAGE_LINES }}"

      - name: Generate HTML report
        run: cargo llvm-cov report --html --output-dir coverage/html

      - name: Upload LCOV artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: lcov.info

      - name: Upload HTML coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: coverage/html